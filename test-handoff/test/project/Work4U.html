<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: #2A2018;
    background-image: radial-gradient(circle at 30% 20%, #3a2c20, #211913 70%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; overflow: hidden;
    font-family: 'Rubik', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #stage { transform-origin: center center; }
  input, button, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* animations */
  @keyframes w4fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes w4pop { from { transform: scale(0.96) translateY(8px); } to { transform: scale(1) translateY(0); } }
  @keyframes w4toast { from { transform: translateY(14px); } to { transform: translateY(0); } }
  @keyframes w4drop { from { transform: translateY(-14px); } to { transform: translateY(0); } }
  @keyframes w4slideup { from { transform: translateY(26px); } to { transform: translateY(0); } }
  @keyframes w4slidex { from { transform: translateY(20px); } to { transform: translateY(0); } }
  @keyframes w4enterFwd { from { transform: translateY(14px); } to { transform: translateY(0); } }
  @keyframes w4enterBack { from { transform: translateY(14px); } to { transform: translateY(0); } }
  @keyframes w4enterUp { from { transform: translateY(14px); } to { transform: translateY(0); } }
</style>
</head>
<body>
  <div id="stage"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="work4u-screens-extra.jsx"></script>
  <script type="text/babel" src="work4u-app.jsx"></script>
</body>
