AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Work4U Serverless Backend Infrastructure

Globals:
  Function:
    Runtime: python3.11
    Timeout: 15
    MemorySize: 256
    Architectures:
      - x86_64
    Environment:
      Variables:
        PREFERENCES_TABLE: !Ref UserPreferencesTable
        VENUES_TABLE: !Ref VenuesTable
        RATINGS_TABLE: !Ref RatingsTable
        IMAGES_BUCKET: !Ref VenueImagesBucket

Resources:

  AutoConfirmSignUpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: Work4U-AutoConfirmSignUpFunction
      CodeUri: ../backend/
      Handler: lambdas.auth_triggers.app.lambda_handler

  AutoConfirmSignUpInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt AutoConfirmSignUpFunction.Arn
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt Work4UUserPool.Arn

  Work4UApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: Work4UApi
      StageName: dev
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: Work4UCognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          Work4UCognitoAuthorizer:
            UserPoolArn: !GetAtt Work4UUserPool.Arn

  Work4UUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: Work4UUserPool
      LambdaConfig:
        PreSignUp: !GetAtt AutoConfirmSignUpFunction.Arn
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  Work4UUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: Work4UWebClient
      UserPoolId: !Ref Work4UUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  UsersGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Users
      UserPoolId: !Ref Work4UUserPool
      Description: Regular Work4U users

  AdminsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Admins
      UserPoolId: !Ref Work4UUserPool
      Description: Work4U system administrators

  UserPreferencesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Work4U_UserPreferences
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  VenuesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Work4U_Venues
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: venueId
          AttributeType: S
      KeySchema:
        - AttributeName: venueId
          KeyType: HASH

  RatingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Work4U_Ratings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ratingId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: venueId
          AttributeType: S
      KeySchema:
        - AttributeName: ratingId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: venueId-index
          KeySchema:
            - AttributeName: venueId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  VenueImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "work4u-venue-images-${AWS::AccountId}-${AWS::Region}"
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
              - HEAD
            AllowedHeaders:
              - "*"

  PreferencesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: Work4U-PreferencesFunction
      CodeUri: ../backend/
      Handler: lambdas.preferences.app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserPreferencesTable
      Events:
        GetPreferences:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /preferences
            Method: GET
        SavePreferences:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /preferences
            Method: POST

  VenuesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: Work4U-VenuesFunction
      CodeUri: ../backend/
      Handler: lambdas.venues.app.lambda_handler
      Environment:
        Variables:
          USER_LEARNING_TABLE: !Ref UserLearningTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UserLearningTable
        - DynamoDBReadPolicy:
            TableName: !Ref VenuesTable
      Events:
        GetVenues:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /venues
            Method: GET
        GetVenueById:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /venues/{venueId}
            Method: GET

  RatingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: Work4U-RatingsFunction
      CodeUri: ../backend/
      Handler: lambdas.ratings.app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RatingsTable
        - DynamoDBReadPolicy:
            TableName: !Ref VenuesTable
      Events:
        GetMyRatings:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /ratings/my
            Method: GET
        SubmitRating:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /ratings
            Method: POST
        UpdateRating:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /ratings/{ratingId}
            Method: PUT
        DeleteRating:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /ratings/{ratingId}
            Method: DELETE

  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: Work4U-AdminFunction
      CodeUri: ../backend/
      Handler: lambdas.admin.app.lambda_handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref VenueImagesBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref VenuesTable
      Events:
        CreateVenue:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /admin/venues
            Method: POST
        UpdateVenue:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /admin/venues/{venueId}
            Method: PUT
        DeleteVenue:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /admin/venues/{venueId}
            Method: DELETE
        GenerateImageUploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /admin/venues/{venueId}/images/upload-url
            Method: POST


  UserLearningTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Work4U_UserLearning
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  LearningFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: Work4U-LearningFunction
      CodeUri: ../backend/
      Handler: lambdas.learning.app.lambda_handler
      Environment:
        Variables:
          USER_LEARNING_TABLE: !Ref UserLearningTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserLearningTable
      Events:
        GetLearningProfile:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /learning
            Method: GET
        RecordLearningEvent:
          Type: Api
          Properties:
            RestApiId: !Ref Work4UApi
            Path: /learning/event
            Method: POST

Outputs:

  UserLearningTableName:
    Description: DynamoDB User Learning table
    Value: !Ref UserLearningTable

  ApiBaseUrl:
    Description: API Gateway base URL
    Value: !Sub "https://${Work4UApi}.execute-api.${AWS::Region}.amazonaws.com/dev"

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref Work4UUserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref Work4UUserPoolClient

  VenueImagesBucketName:
    Description: S3 bucket for venue images
    Value: !Ref VenueImagesBucket

  UserPreferencesTableName:
    Description: DynamoDB User Preferences table
    Value: !Ref UserPreferencesTable

  VenuesTableName:
    Description: DynamoDB Venues table
    Value: !Ref VenuesTable

  RatingsTableName:
    Description: DynamoDB Ratings table
    Value: !Ref RatingsTable
