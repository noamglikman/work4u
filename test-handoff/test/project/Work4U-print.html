<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Work4U — תצוגת מסכים להדפסה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Assistant:wght@400;500;600;700;800&family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #2A2018; font-family: 'Rubik', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .page {
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 26px 0 34px; break-after: page;
  }
  .page:last-child { break-after: auto; }
  .cap {
    color: #F1E8DA; font-size: 15px; font-weight: 700; letter-spacing: 0.01em;
    margin-bottom: 14px; direction: rtl; text-align: center;
  }
  .cap small { display: block; font-weight: 500; opacity: 0.6; font-size: 12px; margin-top: 2px; }
  .frame { display: flex; justify-content: center; width: 100%; }

  @page { size: A4 portrait; margin: 0.6cm; }
  @media print {
    body { background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .cap { color: #2E2319; }
    .page { padding: 10px 0 18px; }
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
  /* keyframes referenced by components — keep defined; print disables them */
  @keyframes w4fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes w4pop { from { transform: scale(0.96); } to { transform: scale(1); } }
  @keyframes w4toast { from { transform: translateY(14px); } to { transform: translateY(0); } }
  @keyframes w4drop { from { transform: translateY(-14px); } to { transform: translateY(0); } }
  @keyframes w4slideup { from { transform: translateY(26px); } to { transform: translateY(0); } }
  @keyframes w4slidex { from { transform: translateY(20px); } to { transform: translateY(0); } }
  @keyframes w4enterFwd { from {} to {} }
  @keyframes w4enterBack { from {} to {} }
  @keyframes w4enterUp { from {} to {} }
</style>
</head>
<body>
  <div id="print-root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="work4u-data.jsx"></script>
  <script type="text/babel" src="work4u-ui.jsx"></script>
  <script type="text/babel" src="work4u-screens-auth.jsx"></script>
  <script type="text/babel" src="work4u-screens-main.jsx"></script>
  <script type="text/babel" src="work4u-screens-extra.jsx"></script>

  <script type="text/babel">
    const noop = () => {};
    const theme = window.W4U_THEMES.coffee;
    const venue = window.W4U_VENUES[0];
    const prefs = { quiet: true, power: true, wifi: true, seat: 'שולחן עבודה', price: '₪₪' };
    const filters = { radius: 5, quiet: true, power: true, wifi: false, open: true, price: 'הכל' };

    const rootVars = { ...theme.vars, fontFamily: "'Rubik', system-ui, sans-serif" };

    function ScreenRoot({ children }) {
      return (
        <div style={{ ...rootVars, position: 'relative', height: '100%', overflow: 'hidden',
          background: 'var(--w4-bg)', color: 'var(--w4-text)', direction: 'rtl', textAlign: 'right' }}>
          {children}
        </div>
      );
    }

    function Page({ title, sub, height = 874, dark = false, children }) {
      const avail = 985;
      const scale = Math.min(1, avail / height);
      return (
        <div className="page">
          <div className="cap">{title}{sub && <small>{sub}</small>}</div>
          <div className="frame" style={{ height: height * scale }}>
            <div style={{ transform: `scale(${scale})`, transformOrigin: 'top center' }}>
              <window.IOSDevice height={height} dark={dark}>
                <ScreenRoot>{children}</ScreenRoot>
              </window.IOSDevice>
            </div>
          </div>
        </div>
      );
    }

    const { LoginScreen, SignUpScreen, PrefsScreen, HomeScreen, VenueScreen,
            HistoryScreen, ProfileScreen, RatingModal, FilterSheet, AdminPanel } = window;

    function PrintDoc() {
      return (
        <React.Fragment>
          <Page title="מסך 1א · התחברות" height={880}>
            <LoginScreen go={noop} toast={noop} openSheet={noop} setAdminMode={noop} />
          </Page>
          <Page title="מסך 1ב · הרשמת משתמש חדש" height={900}>
            <SignUpScreen go={noop} toast={noop} />
          </Page>
          <Page title="מסך 2 · הגדרת פרופיל והעדפות" height={1030}>
            <PrefsScreen go={noop} toast={noop} prefs={prefs} setPrefs={noop} onboarding />
          </Page>
          <Page title="מסך 3 · מסך הבית — מפה ורשימה לומדת" height={874}>
            <HomeScreen go={noop} openSheet={noop} openVenue={noop} venues={window.W4U_VENUES} isAdmin={false} query="" setQuery={noop} />
          </Page>
          <Page title="מסך 4 · פרופיל מתחם ותחזית עומסים" height={1480}>
            <VenueScreen go={noop} v={venue} openModal={noop} nowIdx={6} />
          </Page>
          <Page title="פנל 5 · חלון דירוג קהילתי" height={874}>
            <HomeScreen go={noop} openSheet={noop} openVenue={noop} venues={window.W4U_VENUES} isAdmin={false} query="" setQuery={noop} />
            <RatingModal venue={venue} close={noop} toast={noop} onSubmit={noop} />
          </Page>
          <Page title="פנל סינון מתקדם" height={1000}>
            <HomeScreen go={noop} openSheet={noop} openVenue={noop} venues={window.W4U_VENUES} isAdmin={false} query="" setQuery={noop} />
            <FilterSheet close={noop} filters={filters} setFilters={noop} apply={noop} />
          </Page>
          <Page title="פנל 6 · ניהול מתחמים (מנהל)" height={1140}>
            <AdminPanel close={noop} toast={noop} onPublish={noop} />
          </Page>
          <Page title="מסך 7 · היסטוריית דירוגים" height={920}>
            <HistoryScreen history={window.W4U_HISTORY} venues={window.W4U_VENUES} openVenue={noop} toast={noop} onDelete={noop} />
          </Page>
          <Page title="פרופיל אישי" height={900}>
            <ProfileScreen go={noop} isAdmin={false} prefs={prefs} history={window.W4U_HISTORY} toast={noop} />
          </Page>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('print-root')).render(<PrintDoc />);

    // Auto-print once fonts are loaded and React has rendered all phone frames.
    (function autoPrint() {
      const ready = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
      ready.then(() => { setTimeout(() => window.print(), 900); });
    })();
  </script>
</body>
</html>
