<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Work4U — אפליקציית ווב</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Assistant:wght@400;500;600;700;800&family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Rubik', system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: var(--w4-bg, #F1E8DA); }
  input, button, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--w4-faint) 50%, transparent); border-radius: 999px; border: 3px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* layout */
  .w4-auth { display: flex; min-height: 100vh; }
  .w4-auth-brand { flex: 0 0 44%; }
  .w4-auth-form { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 40px; }

  .w4-home-grid { display: grid; grid-template-columns: 380px 1fr; height: 100%; }
  .w4-home-side { height: 100%; }

  @media (max-width: 880px) {
    .w4-auth-brand { display: none; }
    .w4-auth-form { padding: 36px 24px; }
  }
  @media (max-width: 900px) {
    .w4-home-grid { grid-template-columns: 1fr; height: auto; }
    .w4-home-grid > div:last-child { height: 320px; }
    .w4-home-side { height: auto; border-inline-start: none !important; border-bottom: 1px solid var(--w4-border); }
  }
  @media (max-width: 820px) { .w4-venue-cols { grid-template-columns: 1fr !important; } .w4-venue-cols aside { position: static !important; } }
  @media (max-width: 680px) { .w4-gallery { height: auto !important; grid-template-columns: 1fr 1fr !important; grid-template-rows: none !important; } .w4-gallery > div:first-child { grid-row: auto !important; grid-column: span 2 !important; } }
  @media (max-width: 520px) { .w4-nav { display: none !important; } }

  /* animations */
  @keyframes wfade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes wpop { from { transform: scale(0.96) translateY(8px); } to { transform: scale(1) translateY(0); } }
  @keyframes wdrop { from { transform: translateY(-12px); } to { transform: translateY(0); } }
  @keyframes w4fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes w4pop { from { transform: scale(0.96) translateY(8px); } to { transform: scale(1) translateY(0); } }
  @keyframes w4toast { from { transform: translateY(14px); } to { transform: translateY(0); } }
  @keyframes w4drop { from { transform: translateY(-14px); } to { transform: translateY(0); } }
  @keyframes w4slideup { from { transform: translateY(26px); } to { transform: translateY(0); } }
  @keyframes w4slidex { from { transform: translateY(20px); } to { transform: translateY(0); } }
  @keyframes w4enterFwd { from {} to {} }
  @keyframes w4enterBack { from {} to {} }
  @keyframes w4enterUp { from {} to {} }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="work4u-data.jsx"></script>
  <script type="text/babel" src="work4u-ui.jsx"></script>
  <script type="text/babel" src="work4u-screens-main.jsx"></script>
  <script type="text/babel" src="work4u-screens-extra.jsx"></script>
  <script type="text/babel" src="work4u-web-auth.jsx"></script>
  <script type="text/babel" src="work4u-web-main.jsx"></script>
  <script type="text/babel" src="work4u-web-extra.jsx"></script>
  <script type="text/babel" src="work4u-web-app.jsx"></script>
</body>
</html>
